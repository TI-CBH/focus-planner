services:
  pocketbase:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: focus-pocketbase
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PB_PORT:-8090}:8090"
    volumes:
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_PB_URL: ${VITE_PB_URL:-http://localhost:8090}
    container_name: focus-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:3000"
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  pb_data:
    driver: local
